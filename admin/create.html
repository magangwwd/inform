<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布新通知</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <a class="logo" href="../index.html">通知公告</a>
  <nav>
    <a href="index.html">后台首页</a>
    <a href="#" onclick="doLogout(event)">退出</a>
  </nav>
</header>

<div class="container">
  <div class="flash-container" id="flash-container"></div>
  <div style="margin-bottom:14px;"><a href="index.html" class="text-muted">← 返回后台</a></div>

  <div class="card">
    <div class="page-title">发布新通知</div>
    <form id="notice-form">
      <div class="form-group">
        <label for="title">标题 <span style="color:#e8856a;">*</span></label>
        <input type="text" id="title" class="form-control" placeholder="请输入通知标题" required>
      </div>

      <div class="form-group">
        <label>内容</label>
        <div id="editor"></div>
      </div>

      <div class="form-group">
        <label for="files">附件（可多选）</label>
        <input type="file" id="files" class="form-control" multiple>
        <div class="file-hint" id="file-hint"></div>
      </div>

      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary" id="submit-btn">发布</button>
        <a href="index.html" class="btn btn-secondary">取消</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/notices.js"></script>
<script src="../js/attachments.js"></script>
<script>
  let quill;

  async function init() {
    await requireAuth();
    quill = new Quill('#editor', {
      theme: 'snow',
      modules: { toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['link', 'blockquote'],
        ['clean']
      ]}
    });
  }

  document.getElementById('files').addEventListener('change', function() {
    const names = Array.from(this.files).map(f => f.name);
    document.getElementById('file-hint').textContent =
      names.length ? '已选：' + names.join('、') : '';
  });

  document.getElementById('notice-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    if (!title) { showMsg('标题不能为空', 'error'); return; }

    const content = quill.root.innerHTML;
    const files = Array.from(document.getElementById('files').files);
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>发布中…';

    const { data: notice, error } = await createNotice(title, content);
    if (error) {
      showMsg('发布失败：' + error.message, 'error');
      btn.disabled = false; btn.textContent = '发布';
      return;
    }

    if (files.length > 0) {
      const errs = await uploadAttachments(files, notice.id);
      if (errs.length > 0) showMsg('部分附件上传失败：' + errs.join('；'), 'error');
    }

    window.location.href = 'index.html';
  });

  init();
</script>
</body>
</html>
