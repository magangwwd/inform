<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <a class="logo" href="../index.html">通知公告</a>
  <nav><a href="../index.html">公告列表</a></nav>
</header>

<div class="container">
  <div class="flash-container" id="flash-container"></div>
  <div class="login-wrap">
    <div class="card">
      <div class="login-title">管理员登录</div>
      <form id="login-form">
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" class="form-control"
                 placeholder="请输入管理员密码" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;padding:11px;font-size:15px;">
          登录
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/client.js"></script>
<script src="../js/auth.js"></script>
<script>
  // 已登录则直接跳后台
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>登录中…';

    const { error } = await signIn(password);

    if (error) {
      showMsg('密码错误', 'error');
      btn.disabled = false;
      btn.textContent = '登录';
    } else {
      window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
