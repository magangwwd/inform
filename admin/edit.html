<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑通知</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
  .att-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(173,220,213,0.3); font-size:14px; }
  .att-row:last-child { border-bottom:none; }
</style>
</head>
<body>

<header class="site-header">
  <a class="logo" href="../index.html">通知公告</a>
  <nav>
    <a href="index.html">后台首页</a>
    <a href="#" onclick="doLogout(event)">退出</a>
  </nav>
</header>

<div class="container">
  <div class="flash-container" id="flash-container"></div>
  <div style="margin-bottom:14px;"><a href="index.html" class="text-muted">← 返回后台</a></div>

  <div id="main-card" class="card">
    <div class="loading"><span class="spinner"></span>加载中…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/notices.js"></script>
<script src="../js/attachments.js"></script>
<script>
  let quill;
  let notice;
  let existingAttachments = [];

  async function init() {
    await requireAuth();
    const id = getParam('id');
    if (!id) { window.location.href = 'index.html'; return; }

    const [{ data: n, error: nErr }, { data: atts }] = await Promise.all([
      getNoticeAdmin(id),
      getAttachments(id)
    ]);

    if (nErr || !n) { window.location.href = 'index.html'; return; }

    notice = n;
    existingAttachments = atts || [];
    document.title = '编辑：' + n.title;
    renderForm();
  }

  function renderAttachmentList() {
    if (existingAttachments.length === 0) return '<div class="text-muted" style="padding:4px 0;">无附件</div>';
    return existingAttachments.map(a => `
      <div class="att-row" id="att-${a.id}">
        <span style="font-size:18px;">📎</span>
        <span style="flex:1;">${escHtml(a.filename)}</span>
        <span class="text-muted">${formatSize(a.file_size)}</span>
        <a href="${getPublicUrl(a.stored_name)}" class="btn btn-secondary btn-sm" download="${escHtml(a.filename)}">下载</a>
        <button class="btn btn-danger btn-sm" onclick="delAtt('${a.id}','${a.stored_name}','${escHtml(a.filename).replace(/'/g,"\\'")}')">删除</button>
      </div>
    `).join('');
  }

  function renderForm() {
    document.getElementById('main-card').innerHTML = `
      <div class="page-title">编辑通知</div>
      <form id="notice-form">
        <div class="form-group">
          <label>标题 <span style="color:#e8856a;">*</span></label>
          <input type="text" id="title" class="form-control" value="${escHtml(notice.title)}" required>
        </div>

        <div class="form-group">
          <label>内容</label>
          <div id="editor"></div>
        </div>

        <div class="form-group">
          <label>现有附件</label>
          <div id="att-list">${renderAttachmentList()}</div>
        </div>

        <div class="form-group">
          <label for="files">追加附件（可多选）</label>
          <input type="file" id="files" class="form-control" multiple>
          <div class="file-hint" id="file-hint"></div>
        </div>

        <div style="display:flex;gap:10px;">
          <button type="submit" class="btn btn-primary" id="submit-btn">保存</button>
          <a href="index.html" class="btn btn-secondary">取消</a>
        </div>
      </form>
    `;

    quill = new Quill('#editor', {
      theme: 'snow',
      modules: { toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['link', 'blockquote'],
        ['clean']
      ]}
    });
    quill.root.innerHTML = notice.content || '';

    document.getElementById('files').addEventListener('change', function() {
      const names = Array.from(this.files).map(f => f.name);
      document.getElementById('file-hint').textContent =
        names.length ? '已选：' + names.join('、') : '';
    });

    document.getElementById('notice-form').addEventListener('submit', save);
  }

  async function save(e) {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    if (!title) { showMsg('标题不能为空', 'error'); return; }

    const content = quill.root.innerHTML;
    const files = Array.from(document.getElementById('files').files);
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>保存中…';

    const { error } = await updateNotice(notice.id, title, content);
    if (error) {
      showMsg('保存失败：' + error.message, 'error');
      btn.disabled = false; btn.textContent = '保存';
      return;
    }

    if (files.length > 0) {
      const errs = await uploadAttachments(files, notice.id);
      if (errs.length > 0) { showMsg('部分附件上传失败：' + errs.join('；'), 'error'); }
    }

    window.location.href = 'index.html';
  }

  async function delAtt(id, storedName, filename) {
    if (!confirm(`确认删除附件「${filename}」？`)) return;
    const { error } = await deleteAttachment(id, storedName);
    if (error) { showMsg('删除失败：' + error.message, 'error'); return; }
    existingAttachments = existingAttachments.filter(a => a.id !== id);
    const row = document.getElementById('att-' + id);
    if (row) row.remove();
    if (existingAttachments.length === 0) {
      document.getElementById('att-list').innerHTML = '<div class="text-muted" style="padding:4px 0;">无附件</div>';
    }
    showMsg('附件已删除');
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  init();
</script>
</body>
</html>
